services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "9000:27017"
    volumes:
      - chatWave_db:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/chatwave
    depends_on:
      - mongodb
      - redis:
          condition: service_healthy
    volumes:
      - ./backend:/app
      - chatwave_node_modules:/app/node_modules
    command: "npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - chatwave_node_modules_frontend:/app/node_modules
    command: "npm run dev"
  
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - chatwave_redis:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  chatWave_db:  
  chatwave_node_modules:
  chatwave_node_modules_frontend:
  chatwave_redis:
